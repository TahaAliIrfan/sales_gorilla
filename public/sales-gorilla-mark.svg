<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sales Gorilla">
  <rect width="64" height="64" rx="14" fill="#111111"/>
  <g>
    <!-- Head silhouette -->
    <path d="M16 26 C16 19 22 14 32 14 C42 14 48 19 48 26 L48 41 C48 47 42 51 32 51 C22 51 16 47 16 41 Z" fill="#FAFAFA"/>
    <!-- Brow ridge (the gorilla signature: a heavy dark bar above the eyes) -->
    <rect x="19" y="25" width="26" height="4.5" rx="2.25" fill="#111111"/>
    <!-- Eyes -->
    <circle cx="26" cy="34" r="2.4" fill="#111111"/>
    <circle cx="38" cy="34" r="2.4" fill="#111111"/>
    <!-- Snout / muzzle plate -->
    <ellipse cx="32" cy="44" rx="9" ry="4.6" fill="#1a1a1a"/>
    <!-- Nostrils -->
    <circle cx="29" cy="44" r="1.1" fill="#FAFAFA"/>
    <circle cx="35" cy="44" r="1.1" fill="#FAFAFA"/>
  </g>
</svg>
