<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sales Gorilla">
  <!-- Black rounded square -->
  <rect width="64" height="64" rx="14" fill="#111111"/>
  <!-- Gorilla head silhouette (fills more of the canvas; reads at favicon size) -->
  <path d="M12 26 C12 17 20 10 32 10 C44 10 52 17 52 26 L52 44 C52 51 44 56 32 56 C20 56 12 51 12 44 Z" fill="#FAFAFA"/>
  <!-- Heavy brow ridge (the gorilla's defining feature) -->
  <rect x="16" y="24" width="32" height="6" rx="3" fill="#111111"/>
  <!-- Two recessed eyes below the brow -->
  <circle cx="24" cy="36" r="3" fill="#111111"/>
  <circle cx="40" cy="36" r="3" fill="#111111"/>
  <!-- Muzzle band (a subtle horizontal indent) -->
  <rect x="20" y="46" width="24" height="3" rx="1.5" fill="#111111" opacity="0.85"/>
</svg>
