# Sidekiq Scheduler YAML configuration

# Daily task reminders at 7:00 AM
# task_reminder:
#   cron: "0 7 * * *"  # Every day at 7:00 AM
#   class: TaskReminderWorker
#   queue: low
#   description: "Sends reminder emails for tasks due today and overdue tasks"

# CSV cleanup - runs every 6 hours to clean up expired uploads
csv_cleanup:
  cron: "0 */6 * * *"  # Every 6 hours
  class: CsvCleanupWorker
  queue: default
  description: "Cleans up expired CSV upload files"

# Server health monitoring - runs every 15 minutes
server_health_monitor:
  cron: "*/15 * * * *"  # Every 15 minutes
  class: ServerHealthMonitorWorker
  queue: default
  description: "Monitors server health and sends Google Chat alerts if issues detected"

# Gmail inbox sync - runs every 5 minutes for every connected user
gmail_inbox_sync:
  cron: "*/5 * * * *"  # Every 5 minutes
  class: GmailInboxSyncSchedulerWorker
  queue: default
  description: "Enqueues a per-user Gmail inbox sync to ingest customer replies into the CRM"

# You can add more scheduled jobs here as needed