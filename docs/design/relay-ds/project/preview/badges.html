<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>body{margin:0;padding:20px;background:var(--color-surface);font-family:var(--font-sans);display:flex;flex-direction:column;gap:13px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}</style></head>
<body>
<div class="row"><span class="rl-badge rl-badge--primary">New</span><span class="rl-badge rl-badge--success">Won</span><span class="rl-badge rl-badge--warning">At risk</span><span class="rl-badge rl-badge--danger">Overdue</span><span class="rl-badge rl-badge--info">Scheduled</span><span class="rl-badge rl-badge--solid">12</span></div>
<div class="row"><span class="rl-pill rl-pill--success"><span class="rl-dot"></span>Connected</span><span class="rl-pill rl-pill--danger"><span class="rl-dot"></span>Lost</span><span class="rl-pill rl-pill--brand"><span class="rl-dot"></span>Qualified</span><span class="rl-pill"><span class="rl-dot"></span>Cold</span></div>
<div class="row"><span class="rl-tag"><span class="rl-tag-dot" style="background:var(--cat-1)"></span>Enterprise <button><i data-lucide="x"></i></button></span><span class="rl-tag"><span class="rl-tag-dot" style="background:var(--cat-3)"></span>Inbound <button><i data-lucide="x"></i></button></span><span class="rl-chip is-active">WhatsApp</span></div>
<script>lucide.createIcons();</script>
</body></html>
