<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:18px 20px;background:var(--color-surface);font-family:var(--font-sans)}.lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-fg-3);margin:0 0 12px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.sw{width:44px;height:30px;border-radius:6px}.ch{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:999px;font-size:12px;font-weight:600}.d{width:7px;height:7px;border-radius:50%;background:currentColor}</style></head>
<body>
<p class="lab">Channels &amp; categorical</p>
<div class="row">
<span class="ch" style="background:color-mix(in oklch,var(--channel-whatsapp) 16%,transparent);color:var(--channel-whatsapp)"><span class="d"></span>WhatsApp</span>
<span class="ch" style="background:color-mix(in oklch,var(--channel-call) 16%,transparent);color:var(--channel-call)"><span class="d"></span>Call</span>
<span class="ch" style="background:color-mix(in oklch,var(--channel-email) 16%,transparent);color:var(--channel-email)"><span class="d"></span>Email</span>
<span class="ch" style="background:color-mix(in oklch,var(--channel-sms) 16%,transparent);color:var(--channel-sms)"><span class="d"></span>SMS</span>
</div>
<div class="row" id="cat"></div>
<script>let h='';for(let i=1;i<=8;i++)h+=`<i class="sw" style="background:var(--cat-${i})"></i>`;document.getElementById('cat').innerHTML=h;</script>
</body></html>
