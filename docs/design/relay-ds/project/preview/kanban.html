<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="../components-data.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>body{margin:0;padding:0;background:var(--color-surface);font-family:var(--font-sans)}</style></head>
<body>
<div class="rl-board" style="padding:18px">
<div class="rl-col" style="width:230px"><div class="rl-col__head"><span class="rl-dotmark" style="background:var(--cat-1)"></span><b>Qualified</b><span class="rl-count">2</span></div><div class="rl-col__body">
<div class="rl-dealcard"><div class="rl-dealcard__top"><div class="rl-dealcard__title">Northwind Retail</div></div><div class="rl-dealcard__value">$24,000</div><div class="rl-dealcard__foot"><span class="rl-badge rl-badge--neutral"><i data-lucide="calendar" style="width:11px;height:11px"></i> Thu</span><div class="rl-avatar rl-avatar--xs rl-avatar--c1">AO</div></div></div>
<div class="rl-dealcard"><div class="rl-dealcard__top"><div class="rl-dealcard__title">Helio Logistics</div></div><div class="rl-dealcard__value">$41,200</div><div class="rl-dealcard__foot"><span class="rl-badge rl-badge--warning">At risk</span><div class="rl-avatar rl-avatar--xs rl-avatar--c4">MD</div></div></div>
</div></div>
<div class="rl-col" style="width:230px"><div class="rl-col__head"><span class="rl-dotmark" style="background:var(--cat-2)"></span><b>Won</b><span class="rl-count">1</span></div><div class="rl-col__body">
<div class="rl-dealcard"><div class="rl-dealcard__top"><div class="rl-dealcard__title">Quanta Cloud</div></div><div class="rl-dealcard__value">$112,000</div><div class="rl-dealcard__foot"><span class="rl-badge rl-badge--success"><i data-lucide="check" style="width:11px;height:11px"></i> Closed</span><div class="rl-avatar rl-avatar--xs rl-avatar--c2">PN</div></div></div>
</div></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
