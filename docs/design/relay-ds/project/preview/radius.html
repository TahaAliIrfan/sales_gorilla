<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:18px 20px;background:var(--color-surface);font-family:var(--font-sans)}.lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-fg-3);margin:0 0 14px}.row{display:flex;gap:18px;align-items:flex-end}.b{text-align:center}.b i{display:block;width:56px;height:56px;background:var(--color-primary-subtle);border:1.5px solid var(--color-primary-border)}.b code{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-3);display:block;margin-top:7px}</style></head>
<body>
<p class="lab">Corner radius</p>
<div class="row">
<div class="b"><i style="border-radius:var(--radius-sm)"></i><code>sm·5</code></div>
<div class="b"><i style="border-radius:var(--radius-md)"></i><code>md·8</code></div>
<div class="b"><i style="border-radius:var(--radius-lg)"></i><code>lg·12</code></div>
<div class="b"><i style="border-radius:var(--radius-xl)"></i><code>xl·16</code></div>
<div class="b"><i style="border-radius:var(--radius-pill)"></i><code>pill</code></div>
</div>
</body></html>
