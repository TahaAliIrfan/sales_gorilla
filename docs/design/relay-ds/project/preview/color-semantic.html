<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>body{margin:0;padding:18px 20px;background:var(--color-surface);font-family:var(--font-sans);display:flex;flex-direction:column;gap:12px}.row{display:flex;gap:8px;flex-wrap:wrap}</style></head>
<body>
<div class="row"><span class="rl-pill rl-pill--success"><span class="rl-dot"></span> Success</span><span class="rl-pill rl-pill--warning"><span class="rl-dot"></span> Warning</span><span class="rl-pill rl-pill--danger"><span class="rl-dot"></span> Danger</span><span class="rl-pill rl-pill--info"><span class="rl-dot"></span> Info</span></div>
<div class="row" id="sem"></div>
<script>const k=['success','warning','danger','info'];document.getElementById('sem').innerHTML=k.map(n=>`<div style="display:grid;grid-template-columns:repeat(5,22px);border-radius:6px;overflow:hidden;border:1px solid var(--color-border)">${[100,300,500,700,900].map(s=>`<i style="height:30px;background:var(--${n}-${s})"></i>`).join('')}</div>`).join('');</script>
</body></html>
