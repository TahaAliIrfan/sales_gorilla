<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css"><link rel="stylesheet" href="../components-data.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>body{margin:0;padding:16px;background:var(--color-bg);font-family:var(--font-sans)}</style></head>
<body>
<div class="rl-table-wrap">
<table class="rl-table">
<thead><tr><th class="is-sortable" aria-sort="ascending"><span class="rl-sort">Lead <i data-lucide="arrow-up"></i></span></th><th>Channel</th><th>Stage</th><th style="text-align:right">Value</th></tr></thead>
<tbody>
<tr><td><div style="display:flex;align-items:center;gap:9px"><div class="rl-avatar rl-avatar--sm rl-avatar--c2">NR</div><span class="rl-cell-strong">Northwind Retail</span></div></td><td><span class="rl-pill" style="background:color-mix(in oklch,var(--channel-whatsapp) 14%,transparent);color:var(--channel-whatsapp);border-color:color-mix(in oklch,var(--channel-whatsapp) 30%,transparent)"><i data-lucide="message-circle" style="width:12px;height:12px"></i> WhatsApp</span></td><td><span class="rl-pill rl-pill--brand"><span class="rl-dot"></span> Qualified</span></td><td class="rl-cell-num">$24,000</td></tr>
<tr><td><div style="display:flex;align-items:center;gap:9px"><div class="rl-avatar rl-avatar--sm rl-avatar--c5">QC</div><span class="rl-cell-strong">Quanta Cloud</span></div></td><td><span class="rl-pill" style="background:var(--color-primary-subtle);color:var(--color-primary-text);border-color:var(--color-primary-border)"><i data-lucide="mail" style="width:12px;height:12px"></i> Email</span></td><td><span class="rl-pill rl-pill--success"><span class="rl-dot"></span> Won</span></td><td class="rl-cell-num">$112,000</td></tr>
</tbody>
</table>
</div>
<script>lucide.createIcons();</script>
