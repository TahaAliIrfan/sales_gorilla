<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:22px 24px;background:var(--color-surface);font-family:var(--font-sans);display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.lock{display:flex;align-items:center;gap:12px}.mk{width:44px;height:44px;border-radius:12px;background:var(--color-primary);display:grid;place-items:center;color:#fff}.mk svg{width:26px;height:26px}.wm{font-family:var(--font-display);font-weight:800;font-size:26px;letter-spacing:-.03em;color:var(--color-fg)}
.mono{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--color-border-strong);display:grid;place-items:center;color:var(--color-primary)}.mono svg{width:26px;height:26px}
.note{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-3)}</style></head>
<body>
<div class="lock"><span class="mk"><svg viewBox="0 0 32 32" fill="none"><path d="M6 7.5 14.5 16 6 24.5" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.5 7.5 24 16 15.5 24.5" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/></svg></span><span class="wm">Relay</span></div>
<span class="mono"><svg viewBox="0 0 32 32" fill="none"><path d="M6 7.5 14.5 16 6 24.5" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.5 7.5 24 16 15.5 24.5" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/></svg></span>
<span class="note">Placeholder mark — tenants swap logo + brand color</span>
</body></html>
