<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>body{margin:0;padding:18px 20px;background:var(--color-surface);font-family:var(--font-sans);display:flex;flex-direction:column;gap:10px}
.a{display:flex;gap:12px;padding:13px;border-radius:12px;border:1px solid}.a svg{width:19px;height:19px;flex:none}.t{font-weight:600;font-size:13px}.s{font-size:12px;color:var(--color-fg-2);margin-top:2px}
.i{background:var(--color-info-subtle);border-color:var(--color-info-border);color:var(--color-info-text)}
.w{background:var(--color-warning-subtle);border-color:var(--color-warning-border);color:var(--color-warning-text)}
.d{background:var(--color-danger-subtle);border-color:var(--color-danger-border);color:var(--color-danger-text)}</style></head>
<body>
<div class="a i"><i data-lucide="info"></i><div><div class="t">Sync in progress</div><div class="s">Importing 1,284 leads from your previous CRM.</div></div></div>
<div class="a w"><i data-lucide="triangle-alert"></i><div><div class="t">Trial ends in 3 days</div><div class="s">Add a payment method to keep your pipeline.</div></div></div>
<div class="a d"><i data-lucide="circle-alert"></i><div><div class="t">Call recording failed</div><div class="s">The last 2 calls weren't saved.</div></div></div>
<script>lucide.createIcons();</script>
</body></html>
