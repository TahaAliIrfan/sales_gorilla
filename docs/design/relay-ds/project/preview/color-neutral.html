<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../fonts/fonts.css"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="../tokens.css">
<style>body{margin:0;padding:18px 20px;background:var(--color-surface);font-family:var(--font-sans)}.lab{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-fg-3);margin:0 0 10px}.ramp{display:grid;grid-template-columns:repeat(12,1fr);border-radius:8px;overflow:hidden;border:1px solid var(--color-border)}.ramp i{height:48px}.cap{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--color-fg-3);margin-top:7px}</style></head>
<body>
<p class="lab">Neutral — cool slate (no warm beige)</p>
<div class="ramp" id="r"></div>
<div class="cap"><span>0</span><span>200</span><span>400</span><span>600</span><span>800</span><span>950</span></div>
<script>const s=[0,50,100,200,300,400,500,600,700,800,900,950];document.getElementById('r').innerHTML=s.map(x=>`<i style="background:var(--slate-${x})"></i>`).join('');</script>
</body></html>
